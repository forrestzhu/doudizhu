<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>斗地主</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game">
      <header class="toolbar">
        <div class="toolbar-brand">
          <h1>斗地主</h1>
          <span id="roundMeta" class="meta"></span>
        </div>
        <nav class="toolbar-controls">
          <label class="seed-wrap">
            <span>Seed</span>
            <input id="seedInput" type="number" min="0" step="1" value="42" />
          </label>
          <div class="vtabs">
            <button class="vtab active" data-viewer="0" type="button">玩家 0</button>
            <button class="vtab" data-viewer="1" type="button">玩家 1</button>
            <button class="vtab" data-viewer="2" type="button">玩家 2</button>
          </div>
          <button id="dealButton" class="btn btn-gold" type="button">重新发牌</button>
        </nav>
      </header>

      <section class="felt">
        <div class="felt-top">
          <div class="bottom-cards-section">
            <span class="section-label">底牌</span>
            <div id="bottomCards" class="card-row"></div>
          </div>
        </div>
        <div class="felt-body">
          <div class="side left">
            <div class="seat" id="player1"></div>
            <div class="play-zone" id="play1"></div>
          </div>
          <div class="center">
            <div class="center-info">
              <span id="statusText">准备</span>
              <strong id="viewerText"></strong>
            </div>
            <div class="center-detail">
              <span id="currentPlayerText"></span>
              <span id="winnerText"></span>
            </div>
          </div>
          <div class="side right">
            <div class="play-zone" id="play2"></div>
            <div class="seat" id="player2"></div>
          </div>
        </div>
      </section>

      <section class="bottom-bar">
        <div class="play-zone self-play" id="play0"></div>
        <nav class="action-row">
          <button id="hintButton" class="btn btn-outline" type="button">提示</button>
          <button id="playButton" class="btn btn-gold" type="button" hidden>出牌</button>
          <button id="passButton" class="btn btn-outline" type="button" hidden>不出</button>
          <button id="stepButton" class="btn btn-outline" type="button">单步</button>
          <label class="btn btn-toggle">
            <input id="autoplayToggle" type="checkbox" />
            <span>自动打牌</span>
          </label>
        </nav>
        <div class="seat self-seat" id="player0"></div>
      </section>

      <div class="overlay" id="winnerOverlay" hidden>
        <div class="overlay-card">
          <div class="overlay-icon" id="winnerIcon"></div>
          <h2 id="winnerTitle"></h2>
          <p id="winnerDetail"></p>
          <button class="btn btn-gold" id="newGameBtn" type="button">再来一局</button>
        </div>
      </div>

      <button class="history-trigger" id="historyTrigger" type="button">记录</button>
      <aside class="drawer" id="historyDrawer" hidden>
        <div class="drawer-head">
          <h3>出牌记录</h3>
          <button class="drawer-close" id="drawerClose" type="button"></button>
        </div>
        <ol id="historyList" class="history-list"></ol>
      </aside>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
